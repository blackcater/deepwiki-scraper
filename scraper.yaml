# DeepWiki Scraper Configuration
outputDir: "./output"
maxConcurrency: 3
delayMs: 1000
headless: false
# Retry settings
retryAttempts: 3
retryDelay: 1000
# Nav tree queue concurrency (1 for sequential nav tree scraping)
navTreeConcurrency: 1

# DeepWiki base URL
baseUrl: "https://deepwiki.com"

# File/directory naming format: kebab-case, snake_case, camelCase, PascalCase
nameFormat: kebab-case
